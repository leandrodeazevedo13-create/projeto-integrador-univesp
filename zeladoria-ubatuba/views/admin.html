<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Zeladoria Ubatuba</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5dc; margin: 0; padding: 20px; }
        .container { max-width: 98%; margin: auto; }
        .header { text-align: center; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 11px; }
        .btn-excluir { background-color: #ff4d4d; color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; }
        .btn-pdf { background-color: #dc3545; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .quebrar-texto { max-width: 250px; word-wrap: break-word; white-space: normal; }
        img { width: 80px; height: 60px; object-fit: cover; border-radius: 5px; display: block; margin: auto; }
        .select-status { padding: 6px; border-radius: 5px; border: none; color: white; font-weight: bold; width: 115px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Relatório de Ocorrências</h1>
            <p>Responsável: <strong>Leandro de Azevedo</strong></p>
            <a href="/">← Voltar ao Formulário</a>
        </div>

        <button class="btn-pdf" onclick="gerarRelatorioPDF()">📄 Gerar Relatório para Prefeitura (PDF)</button>

        <div class="table-container">
            <table id="tabela-ocorrencias">
                <thead>
                    <tr>
                        <th style="width: 30px;"><input type="checkbox" id="selecionar-todos"></th>
                        <th style="width: 120px;">Status</th>
                        <th style="width: 140px;">Data</th>
                        <th>Tipo / Descrição / Autor</th>
                        <th>Contato</th>
                        <th style="width: 80px;">Localização</th>
                        <th style="width: 100px;">Foto / Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="7" style="text-align:center;">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const coresStatus = { 'Pendente': '#ffc107', 'Em Andamento': '#17a2b8', 'Concluído': '#28a745' };

        async function carregarDados() {
            const tbody = document.querySelector('#tabela-ocorrencias tbody');
            try {
                const res = await fetch('/api/ocorrencias');
                const ocorrencias = await res.json();
                tbody.innerHTML = '';

                ocorrencias.forEach(item => {
                    const statusAtual = item.status || 'Pendente';
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><input type="checkbox" class="select-item"></td>
                        <td>
                            <select class="select-status" style="background-color: ${coresStatus[statusAtual]}" onchange="atualizarStatus(${item.id}, this.value)">
                                <option value="Pendente" ${statusAtual === 'Pendente' ? 'selected' : ''}>Pendente</option>
                                <option value="Em Andamento" ${statusAtual === 'Em Andamento' ? 'selected' : ''}>Em Andamento</option>
                                <option value="Concluído" ${statusAtual === 'Concluído' ? 'selected' : ''}>Concluído</option>
                            </select>
                        </td>
                        <td>${new Date(item.data_criacao).toLocaleString('pt-BR')}</td>
                        <td class="quebrar-texto"><strong>${item.tipo_ocorrencia}</strong><br><small>${item.descricao}</small></td>
                        <td>${item.contato_feedback || 'n/a'}</td>
                        <td><a href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank">📍 Ver</a></td>
                        <td>
                            ${item.foto_url ? `<img src="/uploads/${item.foto_url}">` : 'Sem foto'}
                            <button class="btn-excluir" onclick="excluirOcorrencia(${item.id})">🗑️ Excluir</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) { tbody.innerHTML = '<tr><td colspan="7">Erro ao carregar.</td></tr>'; }
        }

        async function excluirOcorrencia(id) {
            if (confirm("Deseja excluir permanentemente?")) {
                const res = await fetch(`/api/ocorrencias/${id}`, { method: 'DELETE' });
                if (res.ok) carregarDados();
            }
        }

        function gerarRelatorioPDF() {
            const selecionados = document.querySelectorAll('.select-item:checked');
            if (selecionados.length === 0) return alert("Selecione algo!");
            const janela = window.open('', '_blank');
            let conteudo = `<html><body style="font-family:sans-serif; padding:20px;"><h1>Relatório Zeladoria Ubatuba</h1>`;
            
            selecionados.forEach(cb => {
                const tr = cb.closest('tr');
                const colunas = tr.querySelectorAll('td');
                const fotoSrc = colunas[6].querySelector('img')?.src || '';
                conteudo += `
                    <div style="border:1px solid #ccc; padding:15px; margin-bottom:20px; display:flex; gap:20px;">
                        <div style="flex:1;">
                            <h3>${colunas[3].querySelector('strong').innerText}</h3>
                            <p>Status: ${colunas[1].querySelector('select').value}</p>
                            <p>${colunas[3].querySelector('small').innerText}</p>
                        </div>
                        ${fotoSrc ? `<img src="${fotoSrc}" style="width:150px; height:100px; object-fit:cover;">` : ''}
                    </div>`;
            });
            janela.document.write(conteudo + '</body></html>');
            janela.document.close();
            janela.onload = () => { setTimeout(() => janela.print(), 500); };
        }

        document.getElementById('selecionar-todos').onchange = function() {
            document.querySelectorAll('.select-item').forEach(cb => cb.checked = this.checked);
        };
        carregarDados();
    </script>
</body>
</html>
