<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Zeladoria Ubatuba</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5dc; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { text-align: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .table-container { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #f9f9f9; }
        .btn-mapa { display: inline-block; padding: 8px 12px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-size: 12px; }
        img { width: 100px; height: 70px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Relatório de Ocorrências</h1>
            <p>Responsável: Leandro de Azevedo</p>
            <a href="/" style="color: #007bff; font-weight: bold;">← Voltar ao Formulário</a>
        </div>

        <div class="table-container">
            <table id="tabela-ocorrencias">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Tipo / Descrição</th>
                        <th>Contato</th>
                        <th>Localização</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align:center;">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarDados() {
            try {
                const res = await fetch('/api/ocorrencias');
                const ocorrencias = await res.json();
                const tbody = document.querySelector('#tabela-ocorrencias tbody');
                tbody.innerHTML = '';

                if (ocorrencias.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhuma ocorrência registrada.</td></tr>';
                    return;
                }

                ocorrencias.forEach(item => {
                    // Ajuste de Data (converte a data do banco para PT-BR)
                    const data = item.data_criacao ? new Date(item.data_criacao).toLocaleString('pt-BR') : 'Recém-criado';
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${data}</td>
                        <td>
                            <strong>${item.tipo_ocorrencia}</strong><br>
                            <small>${item.descricao || 'Sem descrição'}</small>
                        </td>
                        <td>${item.contato_feedback || 'Não informado'}</td>
                        <td>
                            <a class="btn-mapa" href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank">
                                📍 Ver no Mapa
                            </a>
                        </td>
                        <td>
                            ${item.foto_url 
                                ? `<img src="/uploads/${item.foto_url}" alt="Foto" onerror="this.src='https://via.placeholder.com/100x70?text=Erro+Foto'">` 
                                : '<span style="color:gray">Sem foto</span>'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Erro ao buscar API:', error);
                document.querySelector('#tabela-ocorrencias tbody').innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Erro ao carregar dados do servidor.</td></tr>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
