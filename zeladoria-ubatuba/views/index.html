<form action="/reportar" method="POST" enctype="multipart/form-data">
    <!-- Identificação do Cidadão -->
    <div class="form-group">
        <label for="nome_usuario">👤 Seu Nome (Opcional)</label>
        <input type="text" id="nome_usuario" name="nome_usuario" placeholder="Ex: Leandro de Azevedo">
    </div>

    <!-- Categoria do Problema -->
    <div class="form-group">
        <label for="tipo_ocorrencia">📋 Tipo de Ocorrência</label>
        <select id="tipo_ocorrencia" name="tipo_ocorrencia" required>
            <option value="">Selecione o tipo de problema...</option>
            <option value="Buraco no Asfalto">🕳️ Buraco no Asfalto</option>
            <option value="Iluminação Pública">💡 Iluminação Pública</option>
            <option value="Limpeza Urbana">🧹 Limpeza Urbana/Lixo</option>
            <option value="Poda de Árvore">🌳 Poda de Árvore</option>
            <option value="Outros">⚙️ Outros</option>
        </select>
    </div>

    <!-- Detalhamento -->
    <div class="form-group">
        <label for="descricao">📝 Descrição Detalhada</label>
        <textarea id="descricao" name="descricao" rows="3" placeholder="Conte-nos mais sobre o problema e um ponto de referência..." required></textarea>
    </div>

    <!-- Mídia -->
    <div class="form-group">
        <label for="foto">📸 Tirar Foto ou Anexar</label>
        <input type="file" id="foto" name="foto" accept="image/*" capture="environment">
        <small style="color: #666; font-size: 11px;">A foto ajuda a equipe a identificar a gravidade.</small>
    </div>

    <!-- Campos Automáticos (Geolocalização) -->
    <input type="hidden" id="latitude" name="latitude">
    <input type="hidden" id="longitude" name="longitude">

    <!-- Ação -->
    <button type="submit" class="btn-enviar" style="margin-top: 10px;">🚀 Enviar Ocorrência</button>
</form>
