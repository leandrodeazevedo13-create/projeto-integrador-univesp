<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeladoria Ubatuba - Vias</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #fdf5e6; 
            color: #333;
        }

        header { 
            background-image: linear-gradient(rgba(0, 51, 102, 0.4), rgba(0, 51, 102, 0.4)), 
                              url('https://images.unsplash.com/photo-1590523741831-ab7e8b8f9c7f?q=80&w=1000'); 
            background-size: cover; 
            background-position: bottom; 
            color: white; 
            text-align: center;
            height: 40vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        header h1 { margin: 0; font-size: 2.2em; }
        header p { margin: 10px 0 0; font-size: 1.1em; }

        .container {
            padding: 20px 25px; 
            max-width: 450px; 
            margin: -40px auto 30px; 
            background-color: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            font-size: 14px;
            color: #003366;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        .btn-enviar { 
            width: 100%; 
            padding: 14px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
        }

        .footer-info {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Zeladoria Ubatuba</h1>
    <p>Monitoramento e Manutenção Viária</p>
    <!-- NOME NO TOPO COMO VOCÊ DESEJAVA -->
    <p style="font-size: 0.9em; opacity: 0.9;">Desenvolvido por: Leandro de Azevedo</p>
</header>

<div class="container">
    <form action="/reportar" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="descricao">Descrição do Problema</label>
            <textarea id="descricao" name="descricao" rows="3" placeholder="Ex: Buraco profundo na via..." required></textarea>
        </div>

        <div class="form-group">
            <label for="foto">Tirar Foto ou Anexar</label>
            <input type="file" id="foto" name="foto" accept="image/*" capture="environment">
        </div>

        <!-- Campos ocultos para GPS -->
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">

        <button type="submit" class="btn-enviar">Enviar Ocorrência</button>
    </form>
    
    <div style="text-align: center; margin-top: 15px;">
        <a href="/painel" style="font-size: 13px; color: #007bff; text-decoration: none;">Ver todas as ocorrências →</a>
    </div>
</div>

<!-- DADOS DE CONTATO NO FINAL -->
<footer class="footer-info">
    <p>Prefeitura de Ubatuba - Zeladoria Urbana</p>
    <p>Dúvidas? WhatsApp: (12) 9XXXX-XXXX | E-mail: zeladoria@ubatuba.sp.gov.br</p>
</footer>

<script>
    // Script simples para pegar a localização do morador de Ubatuba
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('latitude').value = pos.coords.latitude;
            document.getElementById('longitude').value = pos.coords.longitude;
        });
    }
</script>

</body>
</html>
