<form action="/reportar" method="POST" enctype="multipart/form-data" style="max-width: 500px; margin: auto;">
    
    <!-- 1. Identificação do Cidadão (Opcional) -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label for="nome_usuario" style="display: block; font-weight: bold;">👤 Seu Nome (Opcional)</label>
        <input type="text" id="nome_usuario" name="nome_usuario" placeholder="Como deseja ser chamado?" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
    </div>

    <!-- 2. Menu de Ocorrência (Garantindo Visibilidade) -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label for="tipo_ocorrencia" style="display: block; font-weight: bold;">📋 Tipo de Ocorrência</label>
        <select id="tipo_ocorrencia" name="tipo_ocorrencia" required style="display: block; width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background-color: white;">
            <option value="">Selecione o tipo de problema...</option>
            <option value="Buraco no Asfalto">🕳️ Buraco no Asfalto</option>
            <option value="Iluminação Pública">💡 Iluminação Pública</option>
            <option value="Limpeza Urbana">🧹 Limpeza Urbana/Lixo</option>
            <option value="Poda de Árvore">🌳 Poda de Árvore</option>
            <option value="Outros">⚙️ Outros</option>
        </select>
    </div>

    <!-- 3. Detalhamento -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label for="descricao" style="display: block; font-weight: bold;">📝 Descrição Detalhada</label>
        <textarea id="descricao" name="descricao" rows="3" placeholder="Conte-nos mais sobre o problema e um ponto de referência..." required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
    </div>

    <!-- 4. Contato para Feedback (Substituindo o rodapé fixo) -->
    <div class="form-group" style="margin-bottom: 15px; background-color: #f0f8ff; padding: 10px; border-radius: 4px; border: 1px dashed #007bff;">
        <label for="contato_feedback" style="display: block; font-weight: bold; color: #0056b3;">📧 Deseja receber um feedback? (Opcional)</label>
        <input type="text" id="contato_feedback" name="contato_feedback" placeholder="Deixe seu WhatsApp ou E-mail" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px;">
        <small style="display: block; margin-top: 5px; color: #555;">Entraremos em contato apenas para atualizar sobre esta ocorrência.</small>
    </div>

    <!-- 5. Mídia -->
    <div class="form-group" style="margin-bottom: 15px;">
        <label for="foto" style="display: block; font-weight: bold;">📸 Tirar Foto ou Anexar</label>
        <input type="file" id="foto" name="foto" accept="image/*" capture="environment" style="width: 100%;">
    </div>

    <!-- Campos Automáticos (Geolocalização) -->
    <input type="hidden" id="latitude" name="latitude">
    <input type="hidden" id="longitude" name="longitude">

    <!-- Ação -->
    <button type="submit" class="btn-enviar" style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">🚀 Enviar Ocorrência</button>
</form>
