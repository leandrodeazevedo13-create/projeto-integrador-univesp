<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeladoria Ubatuba</title>
    <style>
        /* Imagem de Fundo com truque para limpar cache */
        body {
            margin: 0;
            padding: 0;
            background-image: url('/a.jpg?v=1.1'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #2c3e50; /* Cor de fundo caso a imagem demore */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.5); /* Escureci um pouco mais para destacar o card */
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .header-title {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 450px;
        }

        .form-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #2c3e50;
            font-size: 14px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .feedback-section {
            background-color: #f0f8ff;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #007bff;
            margin: 20px 0;
        }

        .btn-enviar {
            width: 100%;
            padding: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            transition: 0.2s;
        }

        .btn-enviar:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="overlay">
    
    <div class="header-title">
        <h1 style="margin: 0; font-size: 36px;">Zeladoria Ubatuba</h1>
        <p style="margin: 5px 0 0; font-size: 18px; font-weight: 300;">Monitoramento Viário Urbano</p>
    </div>

    <div class="form-container">
        <form action="/reportar" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>👤 Seu Nome (Opcional)</label>
                <input type="text" name="nome_usuario" placeholder="Ex: João Silva">
            </div>

            <div class="form-group">
                <label>📋 Tipo de Ocorrência</label>
                <select name="tipo_ocorrencia" required>
                    <option value="">Selecione o problema...</option>
                    <option value="Buraco no Asfalto">🕳️ Buraco no Asfalto</option>
                    <option value="Iluminação Pública">💡 Iluminação Pública</option>
                    <option value="Limpeza Urbana">🧹 Limpeza Urbana/Lixo</option>
                    <option value="Poda de Árvore">🌳 Poda de Árvore</option>
                    <option value="Outros">⚙️ Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label>📝 Onde é o problema?</label>
                <textarea name="descricao" rows="3" placeholder="Rua, número ou ponto de referência..." required></textarea>
            </div>

            <div class="feedback-section">
                <label style="color: #0056b3;">📧 Quer ser avisado do reparo?</label>
                <input type="text" name="contato_feedback" placeholder="WhatsApp ou E-mail">
            </div>

            <div class="form-group">
                <label>📸 Foto da Situação</label>
                <input type="file" name="foto" accept="image/*" capture="environment">
            </div>

            <input type="hidden" id="latitude" name="latitude">
            <input type="hidden" id="longitude" name="longitude">

            <button type="submit" class="btn-enviar">🚀 Enviar Ocorrência</button>
        </form>
    </div>
</div>

<script>
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById('latitude').value = position.coords.latitude;
            document.getElementById('longitude').value = position.coords.longitude;
        });
    }
</script>

</body>
</html>
